# Korpus production stack.
#
# Run from the deploy/ directory (paths below are relative to this file):
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# All app/worker/db configuration (KORPUS_SECRET_KEY, KORPUS_ALLOWED_HOSTS,
# KORPUS_FERNET_KEY, POSTGRES_*, KORPUS_DOMAIN, ...) is supplied at runtime
# via ../.env — see web/config/settings/base.py + prod.py for the exact env
# var names each setting reads, and deploy/Caddyfile for KORPUS_DOMAIN /
# KORPUS_ACME_EMAIL. Nothing secret lives in this file or in the image.

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes:
      - media:/data/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes:
      - media:/data/media
    command: ["python", "web/manage.py", "qcluster"]
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    # NOTE: env_file (not top-level `environment: ${VAR}` interpolation) so
    # POSTGRES_DB/USER/PASSWORD come from ../.env regardless of the shell
    # compose is invoked from — top-level `${VAR}` substitution only reads
    # a `.env` next to *this* file (or the shell), not the app/worker
    # env_file, which would silently diverge from their values.
    env_file:
      - ../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../landing:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  media:
  caddy_data:
  caddy_config:
