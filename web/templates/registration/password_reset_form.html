{% extends "base.html" %}
{% block title %}Zaboravljena lozinka — Korpus{% endblock %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 64px auto;">
  <h1 class="page-title" style="margin-bottom: 12px;">Zaboravljena lozinka</h1>
  <p class="muted" style="margin-bottom: 20px;">
    Unesite e-poštu i poslaćemo vam uputstvo za resetovanje lozinke.
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label for="id_email">E-pošta</label>
      <input class="input" type="email" name="email" id="id_email" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Pošalji</button>
  </form>
</div>
{% endblock %}
